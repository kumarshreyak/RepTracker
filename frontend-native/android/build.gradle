// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

// Detect Node.js path dynamically for cross-platform compatibility
def nodeExecutable = System.getProperty("react.nodeExecutableAndArgs")
if (nodeExecutable == null) {
  // Try common Node.js locations
  def nodePaths = [
    "/opt/homebrew/bin/node",  // macOS Homebrew (Apple Silicon)
    "/usr/local/bin/node",      // macOS Homebrew (Intel)
    "/usr/bin/node",            // Linux (EAS build servers)
    "node"                      // Fallback to PATH
  ]
  for (path in nodePaths) {
    try {
      def result = providers.exec {
        commandLine(path, "--version")
        ignoreExitValue = true
      }
      if (result.exitValue.get() == 0) {
        nodeExecutable = path
        break
      }
    } catch (Exception e) {
      // Continue to next path
    }
  }
  if (nodeExecutable == null) {
    nodeExecutable = "node"  // Final fallback
  }
}

def reactNativeAndroidDir = new File(
  providers.exec {
    workingDir(rootDir)
    commandLine(nodeExecutable, "--print", "require.resolve('react-native/package.json')")
  }.standardOutput.asText.get().trim(),
  "../android"
)

allprojects {
  repositories {
    maven {
      // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
      url = reactNativeAndroidDir
    }

    google()
    mavenCentral()
    maven { url = 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
