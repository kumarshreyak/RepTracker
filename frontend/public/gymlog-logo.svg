<svg
  width="304"
  height="64"
  viewBox="0 0 304 64"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Icon part (scaled to 64x64) -->
  <g transform="translate(0, 0) scale(0.64, 0.64)">
    <!-- Outer circle -->
    <circle
      cx="50"
      cy="50"
      r="45"
      stroke="#2D3748"
      stroke-width="6"
      fill="none"
    />
    
    <!-- Barbell design -->
    <!-- Left dumbbell -->
    <rect x="14" y="38" width="6" height="24" rx="2" fill="#2D3748" />
    <rect x="18" y="35" width="6" height="30" rx="2" fill="#2D3748" />
    
    <!-- Center bar -->
    <rect x="23" y="48" width="54" height="4" rx="2" fill="#2D3748" />
    
    <!-- Right dumbbell -->
    <rect x="76" y="35" width="6" height="30" rx="2" fill="#2D3748" />
    <rect x="80" y="38" width="6" height="24" rx="2" fill="#2D3748" />
  </g>
  
  <!-- Text part -->
  <text
    x="80"
    y="45"
    fill="#2D3748"
    font-size="48"
    font-family="system-ui, -apple-system, sans-serif"
    font-weight="600"
    letter-spacing="-0.02em"
  >
    GymLog
  </text>
</svg> 