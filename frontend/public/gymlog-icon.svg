<svg
  width="100"
  height="100"
  viewBox="0 0 100 100"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Outer circle -->
  <circle
    cx="50"
    cy="50"
    r="45"
    stroke="#2D3748"
    stroke-width="6"
    fill="none"
  />
  
  <!-- Barbell design -->
  <!-- Left dumbbell -->
  <rect x="14" y="38" width="6" height="24" rx="2" fill="#2D3748" />
  <rect x="18" y="35" width="6" height="30" rx="2" fill="#2D3748" />
  
  <!-- Center bar -->
  <rect x="23" y="48" width="54" height="4" rx="2" fill="#2D3748" />
  
  <!-- Right dumbbell -->
  <rect x="76" y="35" width="6" height="30" rx="2" fill="#2D3748" />
  <rect x="80" y="38" width="6" height="24" rx="2" fill="#2D3748" />
</svg> 