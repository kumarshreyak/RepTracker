steps:
  # Build the populate container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.populate'
      - '-t'
      - 'gcr.io/$PROJECT_ID/gymlog-populate:$COMMIT_SHA'
      - '.'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/gymlog-populate:$COMMIT_SHA'

  # Run the populate script as a Cloud Run job
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'jobs'
      - 'create'
      - 'gymlog-populate-job'
      - '--image'
      - 'gcr.io/$PROJECT_ID/gymlog-populate:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--max-retries'
      - '1'
      - '--parallelism'
      - '1'
      - '--task-count'
      - '1'
      - '--set-env-vars'
      - 'ENV=production'
      - '--update-secrets'
      - 'MONGODB_URI=mongodb-uri:latest,DB_NAME=db-name:latest'
      - '--replace'
    secretEnv: 
      - 'MONGODB_URI'
      - 'DB_NAME'

  # Execute the job
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'jobs'
      - 'execute'
      - 'gymlog-populate-job'
      - '--region'
      - 'us-central1'
      - '--wait'

# Configure secret access for the build
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/mongodb-uri/versions/latest
      env: 'MONGODB_URI'
    - versionName: projects/$PROJECT_ID/secrets/db-name/versions/latest
      env: 'DB_NAME'

images:
  - 'gcr.io/$PROJECT_ID/gymlog-populate:$COMMIT_SHA' 