version: '3.8'

services:
  # MongoDB service
  mongodb:
    image: mongo:7.0
    container_name: gymlog-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: gymlog
    volumes:
      - mongodb_data:/data/db
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - gymlog-network

  # Backend service
  backend:
    build: .
    container_name: gymlog-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      DB_NAME: gymlog
      PORT: 8080
      ENV: development
    env_file:
      - .env
    depends_on:
      - mongodb
    networks:
      - gymlog-network
    volumes:
      - .:/app
    command: ["go", "run", "cmd/server/main.go"]

volumes:
  mongodb_data:

networks:
  gymlog-network:
    driver: bridge 