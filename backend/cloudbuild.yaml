steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/gymlog-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/gymlog-backend:latest'
      - '.'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/gymlog-backend:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/gymlog-backend:latest'

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'gymlog-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/gymlog-backend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'ENV=production'
      - '--update-secrets'
      - 'MONGODB_URI=mongodb-uri:latest,DB_NAME=db-name:latest,JWT_SECRET=jwt-secret:latest'
    secretEnv: 
      - 'MONGODB_URI'
      - 'DB_NAME' 
      - 'JWT_SECRET'

# Configure secret access for the build
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/mongodb-uri/versions/latest
      env: 'MONGODB_URI'
    - versionName: projects/$PROJECT_ID/secrets/db-name/versions/latest
      env: 'DB_NAME'
    - versionName: projects/$PROJECT_ID/secrets/jwt-secret/versions/latest
      env: 'JWT_SECRET'

images:
  - 'gcr.io/$PROJECT_ID/gymlog-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/gymlog-backend:latest' 